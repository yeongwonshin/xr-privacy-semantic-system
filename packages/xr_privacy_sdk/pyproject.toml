[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "xr-privacy-sdk"
version = "0.1.0"
description = "Privacy-preserving semantic extraction SDK for XR AI glasses"
requires-python = ">=3.10"
dependencies = ["pydantic>=2.6", "PyYAML>=6.0", "httpx>=0.27", "numpy>=1.26"]

[tool.setuptools.packages.find]
where = ["."]
include = ["xr_privacy_sdk*"]
