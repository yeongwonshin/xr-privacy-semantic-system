services:
  semantic-server:
    build:
      context: ..
      dockerfile: infra/server.Dockerfile
    ports:
      - "8080:8080"
    environment:
      - XR_PRIVACY_ENV=local
    volumes:
      - ../.local:/app/.local
  edge-gateway:
    build:
      context: ..
      dockerfile: infra/server.Dockerfile
    command: uvicorn apps.edge_gateway.main:app --host 0.0.0.0 --port 8070
    ports:
      - "8070:8070"
    volumes:
      - ../.local:/app/.local
